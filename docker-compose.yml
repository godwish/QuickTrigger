version: '3.8'

services:
  quick-trigger:
    build: .
    container_name: quick-trigger
    restart: always
    ports:
      - "4000:4000"
    environment:
      # 대시보드 서버 설정 (비필수 항목은 .env 파일이나 기본값으로 대체 가능)
      - DATABASE_URL=file:./.runtime/quick-trigger.sqlite
      - HOST=0.0.0.0
      - PORT=4000
      - APP_ORIGIN=http://localhost:4000
      - NODE_ENV=production
    volumes:
      # .runtime 폴더에 DB와 보안 키가 저장되므로 반드시 마운트해야 합니다.
      - ./.runtime:/app/.runtime
